name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool pkg-config cmake textclean zip unzip openjdk-17-jdk-headless
        pip install --upgrade pip
        pip install git+https://github.com/kivy/buildozer.git cython

    - name: Build with Buildozer
      run: |
        buildozer init
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/android.api = 33/android.api = 31/' buildozer.spec
        sed -i 's/# log_level = 2/log_level = 2/' buildozer.spec
        
        export BUILDOZER_ALLOW_KIVY_APP_AS_ROOT=1
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: bin/*.apk
