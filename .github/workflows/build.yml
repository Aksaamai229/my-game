name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          cmake \
          unzip \
          zip \
          openjdk-17-jdk-headless

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install Cython==0.29.33 wheel
        python -m pip install git+https://github.com/kivy/buildozer.git

    - name: Configure and Build
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = 33/android.api = 31/' buildozer.spec
        fi
        export BUILDOZER_ALLOW_KIVY_APP_AS_ROOT=1
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: bin/*.apk
